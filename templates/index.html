<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Night</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pink: #ff2d78;
            --blue: #00d4ff;
            --purple: #9b5de5;
            --dark: #08080f;
        }

        html, body {
            height: 100%; overflow: hidden;
            background: #000; color: #fff;
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ── */
        #app {
            position: relative;
            width: 100vw; height: 100dvh;
            overflow: hidden;
        }

        /* ── Top Bar (overlay) ── */
        .topbar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            height: 30px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 0.8rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem; letter-spacing: 3px;
            background: linear-gradient(90deg, var(--pink), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .remote-hint {
            font-size: 0.55rem; color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
        .remote-hint b { color: var(--blue); }

        /* ── Video Area (fullscreen) ── */
        .video-area {
            position: absolute; inset: 0; z-index: 1;
            background: #000;
        }
        .video-area iframe, .video-area #yt-player {
            width: 100% !important; height: 100% !important;
            border: none; display: block;
        }
        /* Block all interaction with the YouTube player */
        .video-blocker {
            position: absolute; inset: 0; z-index: 3;
            cursor: default;
        }

        /* Start screen — requires user gesture for Smart TVs */
        .start-screen {
            position: fixed; inset: 0; z-index: 999;
            background: var(--dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1.5rem; cursor: pointer;
            padding: 5vh 5vw;
        }
        .start-screen.hidden { display: none; }
        .start-screen::before {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 50% 40%, rgba(255,45,120,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(0,212,255,0.10) 0%, transparent 50%);
            pointer-events: none;
        }
        .start-logo {
            position: relative;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4rem; letter-spacing: 8px;
            background: linear-gradient(90deg, var(--pink), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-mic {
            position: relative;
            font-size: 6rem;
            animation: float 3s ease-in-out infinite;
        }
        .start-btn {
            position: relative;
            background: var(--pink);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 999px;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; letter-spacing: 4px;
            padding: 1.2rem 3.5rem;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(255,45,120,0.5);
            animation: unmute-pulse 1.5s ease-in-out infinite;
        }
        .start-btn:hover, .start-btn:focus {
            transform: scale(1.08);
            outline: 3px solid var(--blue);
            outline-offset: 4px;
        }
        @keyframes unmute-pulse {
            0%,100% { box-shadow: 0 4px 20px rgba(255,45,120,0.4); }
            50% { box-shadow: 0 6px 40px rgba(255,45,120,0.9); }
        }
        .start-hint {
            position: relative;
            font-size: 0.85rem; color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
        }

        /* Queue strip at top of video */
        .queue-strip {
            position: absolute; top: 0; left: 0; right: 0; z-index: 5;
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .qs-now {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.7rem; font-weight: 700;
            white-space: nowrap;
            background: rgba(255,45,120,0.15);
            border: 1px solid var(--pink);
            color: var(--pink);
            animation: now-pulse 2s ease-in-out infinite;
        }
        @keyframes now-pulse {
            0%,100% { box-shadow: 0 0 4px rgba(255,45,120,0.25); }
            50% { box-shadow: 0 0 14px rgba(255,45,120,0.6); }
        }

        .qs-sep {
            color: rgba(255,255,255,0.15);
            font-size: 0.7rem; flex-shrink: 0;
        }

        .qs-next-wrap {
            flex: 1; min-width: 0;
            position: relative; height: 1.4em;
            overflow: hidden;
        }
        .qs-next-item {
            position: absolute; left: 0; top: 0;
            width: 100%;
            font-size: 0.7rem; font-weight: 600;
            color: rgba(255,255,255,0.5);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.5s, transform 0.5s;
        }
        .qs-next-item.visible {
            opacity: 1; transform: translateY(0);
        }
        .qs-next-label {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1.5px;
            color: var(--blue);
            margin-right: 0.4rem;
            font-size: 0.65rem;
        }

        .qs-count {
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            padding: 0.2rem 0.6rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.75rem; letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
        }

        /* Empty state */
        .empty {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 1rem;
            color: rgba(255,255,255,0.2); text-align: center;
        }
        .empty .mic { font-size: 5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        .empty h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem; letter-spacing: 5px;
            color: rgba(255,255,255,0.3);
        }
        .empty p { font-size: 1rem; color: rgba(255,255,255,0.15); }

        /* ── Bottom Bar (overlay) ── */
        .bottom-bar {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center;
            height: 24px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            overflow: hidden;
        }
        .up-next-label {
            flex-shrink: 0;
            padding: 0 0.5rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.6rem; letter-spacing: 2px;
            color: var(--pink);
        }
        .up-next-title {
            flex-shrink: 0;
            font-size: 0.6rem; font-weight: 700;
            color: rgba(255,255,255,0.7);
            margin-right: 1rem;
            max-width: 300px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ticker {
            flex: 1; overflow: hidden;
        }
        .ticker-inner {
            display: inline-block; white-space: nowrap;
            animation: ticker 30s linear infinite;
            font-size: 0.5rem; color: rgba(255,255,255,0.15);
            letter-spacing: 2px; text-transform: uppercase;
        }
        @keyframes ticker {
            from { transform: translateX(100%); }
            to   { transform: translateX(-100%); }
        }

        /* ══════════════════════════════════════
           RESPONSIVE BREAKPOINTS
        ══════════════════════════════════════ */

        /* ── TV / Large desktop (1600px+) ── */
        @media (min-width: 1600px) {
            .topbar { height: 34px; }
            .logo { font-size: 1.1rem; letter-spacing: 4px; }
            .remote-hint { font-size: 0.6rem; }
            .queue-strip { padding: 0.4rem 1rem; gap: 0.6rem; }
            .qs-now { font-size: 0.75rem; padding: 0.3rem 0.8rem; }
            .qs-next-item { font-size: 0.75rem; }
            .qs-next-label { font-size: 0.7rem; }
            .qs-count { font-size: 0.75rem; padding: 0.2rem 0.6rem; }
            .qs-next-wrap { height: 1.4em; }
            .empty .mic { font-size: 6rem; }
            .empty h2 { font-size: 3rem; }
            .empty p { font-size: 1.1rem; }
            .bottom-bar { height: 26px; }
            .up-next-label { font-size: 0.65rem; }
            .up-next-title { font-size: 0.65rem; max-width: 450px; }
            .ticker-inner { font-size: 0.55rem; }
        }

        /* ── Tablet landscape (901–1599px) — default styles apply ── */

        /* ── Tablet portrait (641–900px) ── */
        @media (max-width: 900px) {
            .topbar { height: 50px; padding: 0 1rem; }
            .logo { font-size: 1.5rem; letter-spacing: 4px; }
            .remote-hint { font-size: 0.65rem; }
            .qs-now { font-size: 0.62rem; padding: 0.25rem 0.6rem; max-width: 45vw; overflow: hidden; text-overflow: ellipsis; }
            .qs-next-item { font-size: 0.62rem; }
            .qs-count { font-size: 0.65rem; }
            .bottom-bar { height: 44px; }
            .up-next-label { font-size: 0.7rem; padding: 0 0.7rem; }
            .up-next-title { font-size: 0.7rem; max-width: 200px; }
            .ticker-inner { font-size: 0.58rem; }
        }

        /* ── Phone (≤640px) ── */
        @media (max-width: 640px) {
            .topbar { height: 44px; padding: 0 0.8rem; }
            .logo { font-size: 1.2rem; letter-spacing: 3px; }
            .remote-hint { font-size: 0.55rem; letter-spacing: 0.5px; }
            .queue-strip {
                padding: 0.35rem 0.6rem; gap: 0.4rem;
                flex-wrap: nowrap;
            }
            .qs-now { font-size: 0.55rem; padding: 0.2rem 0.5rem; max-width: 50vw; overflow: hidden; text-overflow: ellipsis; }
            .qs-sep { font-size: 0.55rem; }
            .qs-next-item { font-size: 0.55rem; }
            .qs-next-label { font-size: 0.5rem; }
            .qs-next-wrap { height: 1.2em; }
            .qs-count { font-size: 0.55rem; padding: 0.15rem 0.45rem; }
            .empty .mic { font-size: 3.5rem; }
            .empty h2 { font-size: 1.6rem; letter-spacing: 3px; }
            .empty p { font-size: 0.8rem; }
            .bottom-bar { height: 38px; }
            .up-next-label { font-size: 0.6rem; padding: 0 0.5rem; letter-spacing: 1px; }
            .up-next-title { font-size: 0.6rem; max-width: 120px; margin-right: 0.8rem; }
            .ticker-inner { font-size: 0.5rem; letter-spacing: 1px; }
        }

        /* ── Landscape phone (short + narrow) ── */
        @media (max-height: 500px) and (orientation: landscape) {
            .topbar { height: 36px; }
            .logo { font-size: 1.1rem; }
            .remote-hint { display: none; }
            .queue-strip { padding: 0.25rem 0.6rem; }
            .qs-now { font-size: 0.55rem; padding: 0.2rem 0.5rem; }
            .bottom-bar { height: 30px; }
            .up-next-label { font-size: 0.55rem; }
            .up-next-title { font-size: 0.55rem; }
            .ticker-inner { font-size: 0.45rem; }
        }

        /* ── Samsung TV class (applied via JS) ── */
        .tv-mode .topbar { height: 24px; padding: 0 0.6rem; }
        .tv-mode .logo { font-size: 0.9rem; letter-spacing: 3px; }
        .tv-mode .remote-hint { font-size: 0.5rem; }
        .tv-mode .queue-strip { padding: 0.3rem 0.6rem; gap: 0.4rem; }
        .tv-mode .qs-now { font-size: 0.6rem; padding: 0.2rem 0.6rem; max-width: 40vw; overflow: hidden; text-overflow: ellipsis; }
        .tv-mode .qs-sep { font-size: 0.55rem; }
        .tv-mode .qs-next-item { font-size: 0.6rem; }
        .tv-mode .qs-next-label { font-size: 0.55rem; }
        .tv-mode .qs-next-wrap { height: 1.2em; }
        .tv-mode .qs-count { font-size: 0.6rem; padding: 0.15rem 0.5rem; }
        .tv-mode .empty .mic { font-size: 4rem; }
        .tv-mode .empty h2 { font-size: 2rem; letter-spacing: 4px; }
        .tv-mode .empty p { font-size: 0.8rem; }
        .tv-mode .bottom-bar { height: 20px; }
        .tv-mode .up-next-label { font-size: 0.5rem; padding: 0 0.4rem; }
        .tv-mode .up-next-title { font-size: 0.5rem; max-width: 250px; }
        .tv-mode .ticker-inner { font-size: 0.4rem; }
        .tv-mode .start-logo { font-size: 3rem; letter-spacing: 6px; }
        .tv-mode .start-mic { font-size: 4rem; }
        .tv-mode .start-btn { font-size: 1.4rem; padding: 0.8rem 2.5rem; }
        .tv-mode .start-hint { font-size: 0.7rem; }
    </style>
</head>
<body>
<script>
// Detect Samsung TV viewport (~962x485, dpr ~1.33)
if (window.innerWidth < 1100 && window.innerHeight < 600 && window.devicePixelRatio > 1.2) {
    document.body.classList.add('tv-mode');
}
</script>
<!-- Start screen — one press to unlock playback -->
<div class="start-screen" id="start-screen" onclick="startKaraoke()" tabindex="0">
    <div class="start-mic">🎤</div>
    <div class="start-logo">KARAOKE NIGHT</div>
    <button class="start-btn" autofocus>PRESS TO START</button>
    <div class="start-hint">Press OK on your remote or click anywhere</div>
</div>

<div id="app">
    <header class="topbar">
        <div class="logo">🎤 KARAOKE</div>
        <div class="remote-hint">Add songs at <b>/search</b></div>
    </header>

    <div class="video-area" id="video-area">
        <div class="empty">
            <div class="mic">🎤</div>
            <h2>Ready to Sing!</h2>
            <p>Open /search on your phone to add songs</p>
        </div>
    </div>

    <div class="bottom-bar">
        <span class="up-next-label" id="up-next-label"></span>
        <span class="up-next-title" id="up-next-title"></span>
        <div class="ticker">
            <span class="ticker-inner" id="ticker">🎤 Karaoke Night &nbsp;·&nbsp; Sing your heart out &nbsp;·&nbsp;</span>
        </div>
    </div>
</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ORIGIN = window.location.origin;

let queue = {{ queue | tojson }};
let currentVideoId = null;
let rotateIdx = 1;
let rotateTimer = null;
let player = null;
let ytReady = false;
let skipping = false;
let started = false;

// ── Load YouTube IFrame API ──
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
    ytReady = true;
    if (started) renderAll();
}

// ── Start screen — unlocks audio/video playback ──
function startKaraoke() {
    started = true;
    document.getElementById('start-screen').classList.add('hidden');
    renderAll();
    // Start polling after user gesture
    setInterval(pollQueue, 2000);
}

// Also allow Enter/Space key on TV remote
document.getElementById('start-screen').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startKaraoke(); }
});

// ── Player events ──
function onPlayerReady(event) {
    event.target.unMute();
    event.target.setVolume(100);
    event.target.playVideo();
}

function onPlayerStateChange(event) {
    if (event.data === 0 && !skipping) {
        autoNext();
    }
}

async function autoNext() {
    if (skipping || queue.length === 0) return;
    skipping = true;
    try {
        const data = await fetch('/skip_song', { method: 'POST' }).then(r => r.json());
        if (data.success) {
            queue = data.queue;
            currentVideoId = null;
            renderAll();
        }
    } catch(e) {}
    skipping = false;
}

// ── Video ──
function renderVideo() {
    if (!started) return;
    const panel = document.getElementById('video-area');
    const newId = queue.length ? queue[0].video_id : null;

    if (newId === currentVideoId) return;
    currentVideoId = newId;

    if (player) { try { player.destroy(); } catch(e) {} player = null; }

    if (!newId) {
        panel.innerHTML = `
            <div class="empty">
                <div class="mic">🎤</div>
                <h2>Ready to Sing!</h2>
                <p>Open /search on your phone to add songs</p>
            </div>`;
        return;
    }

    if (ytReady) {
        panel.innerHTML = `
            <div id="yt-player"></div>
            <div class="video-blocker"></div>
            <div class="queue-strip" id="queue-strip"></div>`;

        player = new YT.Player('yt-player', {
            videoId: newId,
            playerVars: {
                autoplay: 1,
                controls: 0,
                disablekb: 1,
                modestbranding: 1,
                playsinline: 1,
                rel: 0,
                fs: 0,
                iv_load_policy: 3,
                origin: ORIGIN,
                enablejsapi: 1
            },
            events: {
                onReady: onPlayerReady,
                onStateChange: onPlayerStateChange
            }
        });
    } else {
        // Fallback if YT API hasn't loaded yet
        panel.innerHTML = `
            <iframe src="https://www.youtube.com/embed/${esc(newId)}?autoplay=1&rel=0&controls=0&disablekb=1&playsinline=1"
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <div class="video-blocker"></div>
            <div class="queue-strip" id="queue-strip"></div>`;
    }

    renderQueueStrip();
}

// ── Queue strip ──
function renderQueueStrip() {
    const strip = document.getElementById('queue-strip');
    if (!strip) return;

    if (!queue.length) { strip.innerHTML = ''; return; }

    const cur = queue[0];
    const upcoming = queue.length - 1;

    let html = `<div class="qs-now">${esc(cur.title)}</div>`;

    if (upcoming > 0) {
        html += `<span class="qs-sep">›</span>`;
        html += `<div class="qs-next-wrap">`;
        for (let i = 1; i < queue.length; i++) {
            html += `<div class="qs-next-item" data-idx="${i}">` +
                `<span class="qs-next-label">UP NEXT</span>${esc(queue[i].title)}</div>`;
        }
        html += `</div>`;
        html += `<div class="qs-count">${upcoming} in queue</div>`;
    }

    strip.innerHTML = html;
    rotateIdx = 1;
    showUpcoming();
    startRotation();
}

function showUpcoming() {
    const items = document.querySelectorAll('.qs-next-item');
    if (!items.length) return;
    items.forEach(el => el.classList.remove('visible'));
    if (rotateIdx < 1 || rotateIdx >= queue.length) rotateIdx = 1;
    const target = document.querySelector(`.qs-next-item[data-idx="${rotateIdx}"]`);
    if (target) target.classList.add('visible');
}

function startRotation() {
    if (rotateTimer) clearInterval(rotateTimer);
    if (queue.length <= 2) return;
    rotateTimer = setInterval(() => {
        rotateIdx++;
        if (rotateIdx >= queue.length) rotateIdx = 1;
        showUpcoming();
    }, 4000);
}

// ── Bottom bar ──
function renderBottom() {
    const label = document.getElementById('up-next-label');
    const title = document.getElementById('up-next-title');
    const ticker = document.getElementById('ticker');

    if (queue.length > 1) {
        label.textContent = 'UP NEXT';
        title.textContent = queue[1].title;
    } else {
        label.textContent = '';
        title.textContent = '';
    }

    ticker.innerHTML = queue.length
        ? queue.map(q => esc(q.title)).join(' &nbsp;·&nbsp; ') + ' &nbsp;·&nbsp; 🎤 &nbsp;·&nbsp;'
        : '🎤 Karaoke Night &nbsp;·&nbsp; Sing your heart out &nbsp;·&nbsp;';
}

function renderAll() {
    renderVideo();
    renderBottom();
}

// ── Poll for queue changes ──
async function pollQueue() {
    try {
        const data = await fetch('/api/queue').then(r => r.json());
        if (JSON.stringify(data.queue) === JSON.stringify(queue)) return;
        const sameSong = data.queue.length && queue.length
            && data.queue[0].video_id === queue[0].video_id;
        queue = data.queue;
        if (sameSong) {
            renderQueueStrip();
            renderBottom();
        } else {
            renderAll();
        }
    } catch(e) {}
}

// Don't render or poll until user presses Start
// renderAll() and setInterval() are called inside startKaraoke()
</script>
</body>
</html>
