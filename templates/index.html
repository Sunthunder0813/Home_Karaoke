<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* ── Big Screen Overlay ───────────────────────────────────── */
        :root {
            --neon-pink: #ff2d78;
            --neon-blue: #00d4ff;
            --dark: #0a0a12;
        }

        #bigscreen-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--dark);
            font-family: 'Nunito', sans-serif;
            color: #fff;
            flex-direction: column;
        }
        #bigscreen-overlay.active { display: flex; }

        /* Ambient glow background */
        #bigscreen-overlay::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255,45,120,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 60% 80%, rgba(138,43,226,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Scanlines */
        #bigscreen-overlay::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
        }

        .bs-top-bar {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1.5rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .bs-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bs-close-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bs-close-btn:hover {
            color: #fff;
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px rgba(255,45,120,0.4);
        }

        .bs-stage {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 320px;
            flex: 1;
            min-height: 0;
        }

        /* Video panel */
        .bs-video-panel {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bs-video-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .bs-now-playing-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border: 1px solid var(--neon-pink);
            border-radius: 999px;
            padding: 0.3rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon-pink);
        }

        .pulse-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--neon-pink);
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.4; transform:scale(0.7); }
        }

        .bs-song-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 3rem 1.5rem 1.2rem;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }

        .bs-song-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.6rem, 3.5vw, 3rem);
            letter-spacing: 2px;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255,45,120,0.5);
        }

        .bs-song-channel {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }

        /* ── Sidebar shell ── */
        .bs-sidebar {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
        }

        /* ── Tab bar ── */
        .bs-tabs {
            display: flex;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .bs-tab {
            flex: 1;
            padding: 0.85rem 0.5rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .bs-tab:hover { color: rgba(255,255,255,0.65); }
        .bs-tab.active {
            color: #fff;
        }
        .bs-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 16%; right: 16%;
            height: 2px;
            background: var(--neon-pink);
            border-radius: 2px 2px 0 0;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .bs-queue-count {
            background: var(--neon-pink);
            color: #fff;
            font-size: 0.55rem;
            font-weight: 900;
            min-width: 16px; height: 16px;
            padding: 0 3px;
            border-radius: 999px;
            display: inline-flex; align-items: center; justify-content: center;
            font-family: 'Nunito', sans-serif;
            letter-spacing: 0;
        }

        /* ── Tab panels ── */
        .bs-tab-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .bs-tab-panel.active { display: flex; }

        /* ── Queue tab ── */
        .bs-queue-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,45,120,0.3) transparent;
        }

        .bs-queue-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.7rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }
        .bs-queue-item:hover { background: rgba(255,255,255,0.04); }
        .bs-queue-item.current {
            background: rgba(255,45,120,0.08);
            border-left: 3px solid var(--neon-pink);
        }

        .bs-q-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.15);
            min-width: 24px;
            text-align: center;
        }
        .bs-queue-item.current .bs-q-num { color: var(--neon-pink); }

        .bs-q-thumb {
            width: 48px; height: 34px;
            object-fit: cover;
            border-radius: 3px;
            background: #222;
            flex-shrink: 0;
        }

        .bs-q-info { flex: 1; min-width: 0; }

        .bs-q-title {
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bs-queue-item.current .bs-q-title { color: var(--neon-pink); }

        .bs-q-channel {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            margin-top: 1px;
        }

        .bs-remove-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 3px 5px;
            border-radius: 4px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .bs-remove-btn:hover { color: var(--neon-pink); background: rgba(255,45,120,0.1); }

        .bs-next-wrap {
            padding: 0.9rem 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        .bs-next-btn {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, var(--neon-pink), #a000c8);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(255,45,120,0.3);
        }
        .bs-next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,45,120,0.5); }
        .bs-next-btn:disabled {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.25);
            box-shadow: none;
            cursor: default;
            transform: none;
        }

        /* ── Search tab ── */
        .bs-search-panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            padding: 0.9rem 1.1rem;
            gap: 0.7rem;
        }

        .bs-search-row {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .bs-search-input {
            flex: 1;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            padding: 0.55rem 0.8rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .bs-search-input::placeholder { color: rgba(255,255,255,0.3); }
        .bs-search-input:focus { border-color: var(--neon-pink); }

        .bs-search-btn {
            background: var(--neon-pink);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 0.55rem 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .bs-search-btn:hover { opacity: 0.85; }
        .bs-search-btn:disabled { opacity: 0.4; cursor: default; }

        .bs-link-row {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .bs-link-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #fff;
            font-size: 0.8rem;
            padding: 0.5rem 0.75rem;
            outline: none;
            font-family: 'Nunito', sans-serif;
            transition: border-color 0.2s;
        }
        .bs-link-input::placeholder { color: rgba(255,255,255,0.25); }
        .bs-link-input:focus { border-color: rgba(0,212,255,0.5); }

        .bs-link-btn {
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px;
            color: var(--neon-blue);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }
        .bs-link-btn:hover { background: rgba(0,212,255,0.25); }

        .bs-search-msg {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            min-height: 1em;
            flex-shrink: 0;
        }
        .bs-search-msg.ok { color: #4cffb0; }
        .bs-search-msg.err { color: var(--neon-pink); }

        .bs-search-divider {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .bs-search-divider::before,
        .bs-search-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .bs-search-results {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,45,120,0.3) transparent;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bs-result-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.55rem 0.4rem;
            border-radius: 8px;
            transition: background 0.15s;
            cursor: default;
        }
        .bs-result-item:hover { background: rgba(255,255,255,0.04); }

        .bs-result-thumb {
            width: 72px; height: 50px;
            object-fit: cover;
            border-radius: 5px;
            background: #222;
            flex-shrink: 0;
        }

        .bs-result-info { flex: 1; min-width: 0; }

        .bs-result-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .bs-result-channel {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bs-result-add {
            background: rgba(255,45,120,0.15);
            border: 1px solid rgba(255,45,120,0.3);
            border-radius: 6px;
            color: var(--neon-pink);
            font-size: 0.7rem;
            font-weight: 900;
            padding: 0.35rem 0.6rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
            font-family: 'Nunito', sans-serif;
        }
        .bs-result-add:hover { background: rgba(255,45,120,0.3); }
        .bs-result-add.added {
            background: rgba(76,255,176,0.12);
            border-color: rgba(76,255,176,0.3);
            color: #4cffb0;
            cursor: default;
        }

        .bs-search-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            text-align: center;
            padding: 2rem 1rem;
        }

        /* Bottom ticker */
        .bs-ticker-bar {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            flex-shrink: 0;
        }

        .bs-ticker-inner {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker {
            from { transform: translateX(100vw); }
            to   { transform: translateX(-100%); }
        }

        /* Empty state inside overlay */
        .bs-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.8rem;
            color: rgba(255,255,255,0.25);
        }
        .bs-empty .mic { font-size: 4rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bs-empty h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 4px;
        }

        @media (max-width: 700px) {
            .bs-stage { grid-template-columns: 1fr; grid-template-rows: 55vw 1fr; }
            .bs-sidebar { border-left: none; border-top: 1px solid rgba(255,255,255,0.06); }
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     BIG SCREEN OVERLAY (hidden by default)
══════════════════════════════════════════ -->
<div id="bigscreen-overlay">
    <div class="bs-top-bar">
        <div class="bs-logo">🎤 Karaoke</div>
        <button class="bs-close-btn" onclick="closeBigScreen()">✕ Close</button>
    </div>

    <div class="bs-stage">
        <div class="bs-video-panel" id="bs-video-panel"></div>

        <div class="bs-sidebar">

            <!-- Tab bar -->
            <div class="bs-tabs">
                <button class="bs-tab active" id="tab-queue" onclick="bsSwitchTab('queue')">
                    QUEUE <span class="bs-queue-count" id="bs-queue-count">0</span>
                </button>
                <button class="bs-tab" id="tab-search" onclick="bsSwitchTab('search')">
                    SEARCH
                </button>
            </div>

            <!-- Queue panel -->
            <div class="bs-tab-panel active" id="panel-queue">
                <div class="bs-queue-list" id="bs-queue-list"></div>
                <div class="bs-next-wrap">
                    <button class="bs-next-btn" id="bs-next-btn" onclick="bsNextSong()" disabled>▶ NEXT SONG</button>
                </div>
            </div>

            <!-- Search panel -->
            <div class="bs-tab-panel" id="panel-search">
                <div class="bs-search-panel">

                    <!-- Keyword search -->
                    <div class="bs-search-row">
                        <input class="bs-search-input" id="bs-search-input"
                               placeholder="Search YouTube for karaoke…"
                               onkeydown="if(event.key==='Enter')bsDoSearch()">
                        <button class="bs-search-btn" id="bs-search-btn" onclick="bsDoSearch()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2.5"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                    </div>

                    <div class="bs-search-divider">or paste a link</div>

                    <!-- Direct link -->
                    <div class="bs-link-row">
                        <input class="bs-link-input" id="bs-link-input"
                               placeholder="https://youtube.com/watch?v=…"
                               onkeydown="if(event.key==='Enter')bsAddLink()">
                        <button class="bs-link-btn" onclick="bsAddLink()">+ Add</button>
                    </div>

                    <div class="bs-search-msg" id="bs-search-msg"></div>

                    <!-- Results -->
                    <div class="bs-search-results" id="bs-search-results">
                        <div class="bs-search-empty">Search for a song above</div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="bs-ticker-bar">
        <span class="bs-ticker-inner" id="bs-ticker">🎤 Karaoke Night &nbsp;·&nbsp; Sing your heart out &nbsp;·&nbsp;</span>
    </div>
</div>


<!-- ══════════════════════════════════════════
     MAIN PAGE
══════════════════════════════════════════ -->
<header>
    <h1>Online Karaoke</h1>
    <button class="bigscreen-btn" onclick="openBigScreen()">🎤 Big Screen</button>
</header>
<main>
    <h2>Song List</h2>
    <ul>
        {% for song in songs %}
            <li><a href="/song/{{ song.id }}">{{ song.title }} by {{ song.artist }}</a></li>
        {% endfor %}
    </ul>

    <h2>Add YouTube Video by Link</h2>
    <form id="youtube-link-form">
        <input type="text" id="youtube-link" placeholder="Paste YouTube video link here..." required>
        <button type="submit">Add to Queue</button>
    </form>
    <div id="youtube-link-message"></div>

    <h2>YouTube Karaoke Search</h2>
    <form id="youtube-search-form" class="yt-search-bar">
        <input type="text" id="youtube-query" class="yt-search-input" placeholder="Search YouTube for karaoke..." required>
        <button type="submit" class="yt-search-btn">
            <svg height="20" width="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </form>
    <div id="youtube-results"></div>

    <h2>Karaoke Queue</h2>
    <div id="queue-hint"></div>
    <ul id="karaoke-queue"></ul>
</main>


<script>
// ── State ─────────────────────────────────────────────────────────────────────
let queue = {{ queue | tojson }};
let currentPlayingId = null;   // iframe only re-created when this changes

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tab switching (never touches video panel) ─────────────────────────────────
function bsSwitchTab(tab) {
    document.querySelectorAll('.bs-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.bs-tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'search') {
        setTimeout(() => document.getElementById('bs-search-input').focus(), 50);
    }
}

// ── Main page queue render ────────────────────────────────────────────────────
function renderMainQueue() {
    const ul   = document.getElementById('karaoke-queue');
    const hint = document.getElementById('queue-hint');
    ul.innerHTML = '';
    hint.innerHTML = '';
    if (!queue.length) return;
    hint.innerHTML = `Playing <strong>${escHtml(queue[0].title)}</strong> now.
        <a href="#" class="queue-hint-link" onclick="openBigScreen();return false;">Open Big Screen →</a>`;
    queue.forEach((item, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <span>${escHtml(item.title)} (${escHtml(item.channel)})</span>
            <button onclick="removeFromQueue(${i})">Remove</button><br>
            <iframe width="320" height="180"
                src="https://www.youtube.com/embed/${item.video_id}?rel=0"
                frameborder="0" allowfullscreen></iframe>`;
        ul.appendChild(li);
    });
}

// ── Big screen: video — only fires when now-playing song changes ───────────────
function renderBigScreenVideo() {
    const panel = document.getElementById('bs-video-panel');
    const newId = queue.length ? queue[0].video_id : null;
    if (newId === currentPlayingId) return;   // ← guard: leave iframe alone
    currentPlayingId = newId;

    if (!newId) {
        panel.innerHTML = `
            <div class="bs-empty">
                <div class="mic">🎤</div>
                <h2>Queue is empty</h2>
                <p style="font-size:0.8rem;">Search for a song in the Search tab</p>
            </div>`;
        return;
    }
    const cur = queue[0];
    panel.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${cur.video_id}?autoplay=1&rel=0"
            allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="bs-now-playing-badge"><span class="pulse-dot"></span> Now Playing</div>
        <div class="bs-song-info" id="bs-song-info">
            <div class="bs-song-title">${escHtml(cur.title)}</div>
            <div class="bs-song-channel">${escHtml(cur.channel)}</div>
        </div>`;
}

// ── Big screen: sidebar queue list + chrome (never touches iframe) ─────────────
function renderBigScreenSidebar() {
    const qList   = document.getElementById('bs-queue-list');
    const nextBtn = document.getElementById('bs-next-btn');
    const badge   = document.getElementById('bs-queue-count');
    const ticker  = document.getElementById('bs-ticker');

    badge.textContent = queue.length;
    nextBtn.disabled  = queue.length <= 1;
    ticker.innerHTML  = queue.length
        ? queue.map(q => escHtml(q.title)).join(' &nbsp;·&nbsp; ') + ' &nbsp;·&nbsp; 🎤 Karaoke Night &nbsp;·&nbsp;'
        : '🎤 Karaoke Night &nbsp;·&nbsp; Sing your heart out &nbsp;·&nbsp;';

    qList.innerHTML = '';
    queue.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'bs-queue-item' + (i === 0 ? ' current' : '');
        div.innerHTML = `
            <span class="bs-q-num">${i + 1}</span>
            <img class="bs-q-thumb" src="https://img.youtube.com/vi/${item.video_id}/default.jpg" alt="">
            <div class="bs-q-info">
                <div class="bs-q-title">${escHtml(item.title)}</div>
                <div class="bs-q-channel">${escHtml(item.channel)}</div>
            </div>
            <button class="bs-remove-btn" onclick="removeFromQueue(${i})">✕</button>`;
        qList.appendChild(div);
    });
}

function renderAll() {
    renderMainQueue();
    renderBigScreenVideo();    // no-op if same song playing
    renderBigScreenSidebar();  // always safe — never touches iframe
}

// ── Big screen open / close ───────────────────────────────────────────────────
function openBigScreen() {
    document.getElementById('bigscreen-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    renderBigScreenVideo();
    renderBigScreenSidebar();
}
function closeBigScreen() {
    document.getElementById('bigscreen-overlay').classList.remove('active');
    document.body.style.overflow = '';
    // intentionally keep currentPlayingId so reopening doesn't restart video
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeBigScreen(); });

// ── Queue actions ─────────────────────────────────────────────────────────────
async function addToQueue(video_id, title, channel) {
    const wasEmpty = queue.length === 0;
    const fd = new FormData();
    fd.append('video_id', video_id); fd.append('title', title); fd.append('channel', channel);
    const data = await fetch('/add_to_queue', {method:'POST', body: fd}).then(r => r.json());
    if (data.success) {
        queue = data.queue;
        renderAll();
        if (wasEmpty) openBigScreen();
    }
}

async function removeFromQueue(idx) {
    const fd = new FormData();
    fd.append('idx', idx);
    const data = await fetch('/remove_from_queue', {method:'POST', body: fd}).then(r => r.json());
    if (data.success) { queue = data.queue; renderAll(); }
}

async function bsNextSong() {
    // Remove the first song and auto-skip until a playable video is found or queue is empty
    let attempts = 0;
    while (queue.length > 0 && attempts < 10) {
        await removeFromQueue(0);
        // Wait for DOM update
        await new Promise(r => setTimeout(r, 100));
        // Check if the new first video is playable (iframe loads, not 'Video unavailable')
        // We can't check programmatically, so just break after one attempt
        // (If you want to skip multiple, you could add a check here)
        break;
    }
}

// ── Big screen: keyword search (lives inside the overlay, no page interaction) ─
async function bsDoSearch() {
    const input = document.getElementById('bs-search-input');
    const btn   = document.getElementById('bs-search-btn');
    const res   = document.getElementById('bs-search-results');
    const msg   = document.getElementById('bs-search-msg');
    const q = input.value.trim();
    if (!q) return;

    btn.disabled = true;
    res.innerHTML = '<div class="bs-search-empty">Searching…</div>';
    msg.textContent = '';

    try {
        const data = await fetch(`/youtube_search?q=${encodeURIComponent(q)}`).then(r => r.json());
        res.innerHTML = '';
        if (!data.results.length) {
            res.innerHTML = '<div class="bs-search-empty">No results found.</div>';
            return;
        }
        data.results.forEach(v => {
            const div = document.createElement('div');
            div.className = 'bs-result-item';
            div.innerHTML = `
                <img class="bs-result-thumb" src="${v.thumbnail}" alt="">
                <div class="bs-result-info">
                    <div class="bs-result-title">${escHtml(v.title)}</div>
                    <div class="bs-result-channel">${escHtml(v.channel)}</div>
                </div>
                <button class="bs-result-add"
                    data-id="${escHtml(v.id)}"
                    data-title="${escHtml(v.title)}"
                    data-channel="${escHtml(v.channel)}"
                >+ Add</button>
            `;
            const btn = div.querySelector('.bs-result-add');
            btn.addEventListener('click', function() {
                addToQueue(
                    btn.getAttribute('data-id'),
                    btn.getAttribute('data-title'),
                    btn.getAttribute('data-channel')
                );
            });
            res.appendChild(div);
        });
    } catch(e) {
        res.innerHTML = '<div class="bs-search-empty">Search failed. Try again.</div>';
    } finally {
        btn.disabled = false;
    }
}

window.bsAddFromResult = async function(btn, video_id, title, channel) {
    btn.disabled = true;
    btn.textContent = '…';
    await addToQueue(video_id, title, channel);
    btn.classList.add('added');
    btn.textContent = '✓ Added';
    // switch to queue tab so they can see it was added
    bsSwitchTab('queue');
}

// ── Big screen: add by pasted link ────────────────────────────────────────────
async function bsAddLink() {
    const input = document.getElementById('bs-link-input');
    const msg   = document.getElementById('bs-search-msg');
    const link  = input.value.trim();
    if (!link) return;
    msg.className = 'bs-search-msg';
    msg.textContent = 'Adding…';
    const fd = new FormData();
    fd.append('youtube_link', link);
    const data = await fetch('/add_link_to_queue', {method:'POST', body: fd}).then(r => r.json());
    if (data.success) {
        queue = data.queue;
        renderAll();
        if (data.was_empty) openBigScreen();
        input.value = '';
        msg.className = 'bs-search-msg ok';
        msg.textContent = '✓ Added to queue!';
        bsSwitchTab('queue');
        setTimeout(() => { msg.textContent = ''; }, 3000);
    } else {
        msg.className = 'bs-search-msg err';
        if (data.error === 'Video not allowed') {
            msg.textContent = '✗ This video cannot be added. Only embeddable videos from trusted karaoke channels are allowed.';
        } else if (data.error) {
            msg.textContent = '✗ ' + data.error;
        } else {
            msg.textContent = '✗ Invalid YouTube link.';
        }
    }
}

// ── Main page: add by pasted link form ────────────────────────────────────────
document.getElementById('youtube-link-form').onsubmit = async function(e) {
    e.preventDefault();
    const wasEmpty = queue.length === 0;
    const link = document.getElementById('youtube-link').value;
    const fd = new FormData(); fd.append('youtube_link', link);
    const data = await fetch('/add_link_to_queue', {method:'POST', body: fd}).then(r => r.json());
    const msg = document.getElementById('youtube-link-message');
    if (data.success) {
        msg.innerHTML = 'Added to queue!';
        queue = data.queue; renderAll();
        if (wasEmpty) openBigScreen();
        document.getElementById('youtube-link').value = '';
    } else { msg.innerHTML = 'Invalid YouTube link.'; }
};

// ── Main page: YouTube search ─────────────────────────────────────────────────
document.getElementById('youtube-search-form').onsubmit = async function(e) {
    e.preventDefault();
    const q = document.getElementById('youtube-query').value;
    const data = await fetch(`/youtube_search?q=${encodeURIComponent(q)}`).then(r => r.json());
    const div = document.getElementById('youtube-results');
    div.innerHTML = '';
    if (!data.results.length) { div.innerHTML = '<p>No results found.</p>'; return; }
    data.results.forEach(v => {
        const el = document.createElement('div');
        el.innerHTML = `
            <img src="${v.thumbnail}" width="120">
            <b>${escHtml(v.title)}</b> <i>by ${escHtml(v.channel)}</i> [${v.duration}]
            <button onclick="addToQueue('${v.id}', ${JSON.stringify(v.title)}, ${JSON.stringify(v.channel)})">Add to Queue</button>
            <a href="${v.link}" target="_blank">Watch</a>`;
        div.appendChild(el);
    });
};

// Initial render
renderAll();
</script>
</body>
</html>
